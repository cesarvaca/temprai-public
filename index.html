document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+ cool signal-blue,\n   with a single green reserved for \"Live\".\n   Aesthetic: hairlines, mono metadata, a timeline spine.\n   ========================================================= */\n\n:root {\n  /* --- ink / surfaces (warm near-black) --- */\n  --ink:        oklch(0.165 0.012 66);   /* page background           */\n  --ink-2:      oklch(0.205 0.013 66);   /* raised surface / cards    */\n  --ink-3:      oklch(0.255 0.014 66);   /* hover surface             */\n\n  /* --- text --- */\n  --fg:         oklch(0.94 0.008 80);    /* primary warm off-white    */\n  --fg-dim:     oklch(0.72 0.012 78);    /* secondary                 */\n  --fg-faint:   oklch(0.55 0.012 76);    /* metadata / captions       */\n\n  /* --- accents (shared L/C, hue only varies) --- */\n  --brass:      oklch(0.80 0.095 82);    /* primary warm accent       */\n  --signal:     oklch(0.78 0.095 232);   /* cool signal-blue          */\n  --live:       oklch(0.80 0.095 152);   /* green — \"Live\" only       */\n\n  /* --- hairlines --- */\n  --line:       color-mix(in oklch, var(--fg) 14%, transparent);\n  --line-soft:  color-mix(in oklch, var(--fg) 7%, transparent);\n\n  /* --- motion: mechanical, no overshoot --- */\n  --ease:       cubic-bezier(0.65, 0, 0.35, 1);\n  --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);\n\n  /* --- rhythm --- */\n  --gutter:     clamp(20px, 5vw, 56px);\n  --maxw:       1200px;\n  --radius:     3px;\n\n  /* accent slot, overridden per-card inline by JS */\n  --accent:     var(--brass);\n}\n\n* { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  background: var(--ink);\n  color: var(--fg);\n  font-family: \"JetBrains Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n  font-size: 15px;\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  /* faint instrument grid + vignette */\n  background-image:\n    radial-gradient(120% 80% at 50% -10%, color-mix(in oklch, var(--brass) 7%, transparent), transparent 60%),\n    linear-gradient(var(--line-soft) 1px, transparent 1px);\n  background-size: auto, 100% 64px;\n  background-position: 0 0, 0 -1px;\n}\n\n::selection { background: color-mix(in oklch, var(--brass) 40%, transparent); color: var(--fg); }\n\na { color: inherit; text-decoration: none; }\n\n.dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--brass);\n  display: inline-block;\n}\n\n/* ============ TOP BAR ============ */\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  border-bottom: 1px solid var(--line);\n  background: color-mix(in oklch, var(--ink) 82%, transparent);\n  backdrop-filter: blur(8px);\n}\n.topbar__inner {\n  max-width: var(--maxw);\n  margin: 0 auto;\n  padding: 11px var(--gutter);\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  font-size: 11px;\n  letter-spacing: 0.16em;\n}\n.topbar__mark { font-weight: 600; color: var(--fg); }\n.topbar__sep { flex: 0 0 1px; height: 12px; background: var(--line); }\n.topbar__meta { color: var(--fg-faint); }\n@media (max-width: 560px) { .topbar__meta { display: none; } }\n\n.clock {\n  margin-left: auto;\n  display: flex; align-items: center; gap: 8px;\n  font-size: 11px; letter-spacing: 0.12em;\n  color: var(--fg-dim);\n}\n.clock__pulse {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--signal);\n  box-shadow: 0 0 0 0 color-mix(in oklch, var(--signal) 60%, transparent);\n}\n/* stepped, mechanical one-second tick (no easing curve = movement feel) */\n.clock__pulse.is-tick { animation: tick 1s steps(1, end); }\n@keyframes tick {\n  0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--signal) 55%, transparent); opacity: 1; }\n  50%  { box-shadow: 0 0 0 5px color-mix(in oklch, var(--signal) 0%, transparent); opacity: 0.35; }\n  100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--signal) 0%, transparent); opacity: 1; }\n}\n.clock__time { color: var(--fg); font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\"; }\n.clock__zone { color: var(--fg-faint); }\n@media (max-width: 420px) { .clock__zone { display: none; } }\n\n/* ============ HERO ============ */\n.hero {\n  border-bottom: 1px solid var(--line);\n}\n.hero__inner {\n  max-width: var(--maxw);\n  margin: 0 auto;\n  padding: clamp(56px, 11vw, 128px) var(--gutter) clamp(48px, 9vw, 96px);\n}\n.hero__eyebrow {\n  margin: 0 0 clamp(28px, 6vw, 52px);\n  display: flex; align-items: center; gap: 12px;\n  font-size: 11px; letter-spacing: 0.28em;\n  color: var(--fg-faint);\n}\n\n.wordmark {\n  margin: 0;\n  font-family: \"Bricolage Grotesque\", system-ui, sans-serif;\n  font-weight: 800;\n  font-size: clamp(72px, 19vw, 240px);\n  line-height: 0.86;\n  letter-spacing: -0.03em;\n  color: var(--fg);\n  font-optical-sizing: auto;\n}\n.wordmark__ai {\n  color: var(--brass);\n  /* hairline notch under the AI, like an engraved cut */\n  -webkit-text-stroke: 0;\n}\n\n.hero__statement {\n  margin: clamp(28px, 5vw, 44px) 0 0;\n  max-width: 34ch;\n  font-size: clamp(15px, 2vw, 19px);\n  line-height: 1.55;\n  color: var(--fg-dim);\n  text-wrap: pretty;\n}\n\n/* etymology — instrument-panel detail */\n.etymology {\n  margin-top: clamp(36px, 6vw, 56px);\n  display: flex;\n  flex-wrap: wrap;\n  align-items: baseline;\n  gap: 10px 16px;\n  padding-top: 20px;\n  border-top: 1px solid var(--line-soft);\n  font-size: 12px;\n  letter-spacing: 0.04em;\n}\n.etymology__part { display: inline-flex; align-items: baseline; gap: 8px; }\n.etymology__word {\n  color: var(--brass);\n  font-weight: 600;\n  font-size: 14px;\n  letter-spacing: 0.02em;\n}\n.etymology__word--ai { color: var(--signal); }\n.etymology__gloss { color: var(--fg-faint); }\n.etymology__op { color: var(--fg-faint); font-size: 14px; }\n.etymology__result {\n  margin-left: 4px;\n  padding: 4px 10px;\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  color: var(--fg);\n  font-weight: 600;\n  letter-spacing: 0.18em;\n}\n\n/* ============ INDEX (apps) ============ */\n.index {\n  max-width: var(--maxw);\n  margin: 0 auto;\n  padding: clamp(48px, 8vw, 88px) var(--gutter) clamp(64px, 10vw, 120px);\n}\n.index__head {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  gap: 16px;\n  flex-wrap: wrap;\n  margin-bottom: clamp(40px, 7vw, 72px);\n}\n.index__title {\n  margin: 0;\n  font-family: \"Bricolage Grotesque\", system-ui, sans-serif;\n  font-weight: 600;\n  font-size: clamp(30px, 6vw, 52px);\n  letter-spacing: -0.02em;\n  color: var(--fg);\n}\n.index__sub {\n  margin: 0;\n  font-size: 11px; letter-spacing: 0.18em;\n  color: var(--fg-faint);\n}\n.index__sub-sep { margin: 0 6px; }\n\n/* --- timeline + spine --- */\n.timeline { position: relative; }\n.timeline__spine {\n  position: absolute;\n  top: 0; bottom: 0;\n  left: 7px;                 /* mobile: vertical spine on the left */\n  width: 1px;\n  background: linear-gradient(var(--line), var(--line-soft));\n}\n\n.grid {\n  display: grid;\n  grid-template-columns: 1fr;          /* mobile-first: single column */\n  gap: 18px;\n  padding-left: 32px;                  /* room for spine + connectors */\n}\n\n/* ============ CARD ============ */\n.card {\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  min-height: 200px;\n  padding: 22px 22px 20px;\n  background: var(--ink-2);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  /* mechanical lift, no bounce */\n  transition: transform 0.45s var(--ease),\n              border-color 0.45s var(--ease),\n              background 0.45s var(--ease);\n  overflow: hidden;\n}\n/* accent hairline along the top edge */\n.card::before {\n  content: \"\";\n  position: absolute; left: 0; top: 0; right: 0;\n  height: 2px;\n  background: var(--accent);\n  opacity: 0.55;\n  transition: opacity 0.45s var(--ease);\n}\n/* connector tick from spine to card */\n.card::after {\n  content: \"\";\n  position: absolute;\n  left: -32px; top: 28px;\n  width: 25px; height: 1px;\n  background: var(--line);\n}\n/* node on the spine */\n.card__node {\n  position: absolute;\n  left: -32px; top: 24px;\n  width: 9px; height: 9px;\n  transform: translateX(-4px);\n  border-radius: 50%;\n  background: var(--ink);\n  border: 1px solid var(--accent);\n}\n.card__node::after {\n  content: \"\";\n  position: absolute; inset: 2px;\n  border-radius: 50%;\n  background: var(--accent);\n  opacity: 0;\n  transition: opacity 0.45s var(--ease);\n}\n\n.card:hover {\n  transform: translateY(-4px);\n  border-color: color-mix(in oklch, var(--accent) 55%, var(--line));\n  background: var(--ink-3);\n}\n.card:hover::before { opacity: 1; }\n.card:hover .card__node::after { opacity: 1; }\n\n/* --- card meta row --- */\n.card__top {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 10px;\n  margin-bottom: 18px;\n}\n.card__stamp {\n  font-size: 10.5px; letter-spacing: 0.16em;\n  color: var(--fg-faint);\n  font-variant-numeric: tabular-nums;\n}\n\n.badge {\n  display: inline-flex; align-items: center; gap: 7px;\n  padding: 3px 9px 3px 8px;\n  font-size: 10px; letter-spacing: 0.16em;\n  border: 1px solid var(--line);\n  border-radius: 100px;\n  color: var(--fg-dim);\n  white-space: nowrap;\n}\n.badge__led {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--fg-faint);\n}\n.badge--live   { color: var(--live);   border-color: color-mix(in oklch, var(--live) 45%, transparent); }\n.badge--live .badge__led   { background: var(--live);   box-shadow: 0 0 8px color-mix(in oklch, var(--live) 70%, transparent); animation: blink 2s var(--ease) infinite; }\n.badge--beta   { color: var(--signal); border-color: color-mix(in oklch, var(--signal) 45%, transparent); }\n.badge--beta .badge__led   { background: var(--signal); }\n.badge--wip    { color: var(--brass);  border-color: color-mix(in oklch, var(--brass) 45%, transparent); }\n.badge--wip .badge__led    { background: var(--brass); }\n.badge--soon   { color: var(--fg-faint); }\n@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }\n\n/* --- card body --- */\n.card__head {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n}\n.card__icon {\n  flex: 0 0 auto;\n  width: 52px; height: 52px;\n  border-radius: 13px;            /* iOS-squircle-ish */\n  border: 1px solid var(--line);\n  background: var(--ink);\n  object-fit: cover;\n  transition: transform 0.45s var(--ease);\n}\n.card:hover .card__icon { transform: scale(1.04); }\n\n.card__name {\n  margin: 0;\n  font-family: \"Bricolage Grotesque\", system-ui, sans-serif;\n  font-weight: 700;\n  font-size: clamp(24px, 4vw, 30px);\n  letter-spacing: -0.015em;\n  line-height: 1.04;\n  color: var(--fg);\n}\n.card__tagline {\n  margin: 8px 0 0;\n  font-size: 13px;\n  line-height: 1.5;\n  color: var(--fg-dim);\n  text-wrap: pretty;\n}\n\n/* description: revealed on hover (collapses by default) */\n.card__reveal {\n  display: grid;\n  grid-template-rows: 0fr;\n  transition: grid-template-rows 0.5s var(--ease);\n}\n.card__reveal-inner { overflow: hidden; }\n.card__desc {\n  margin: 14px 0 0;\n  padding-top: 14px;\n  border-top: 1px solid var(--line-soft);\n  font-size: 12.5px;\n  line-height: 1.6;\n  color: var(--fg-faint);\n  text-wrap: pretty;\n}\n.card:hover .card__reveal,\n.card:focus-within .card__reveal { grid-template-rows: 1fr; }\n\n/* tags pinned to the bottom */\n.card__tags {\n  margin-top: auto;\n  padding-top: 18px;\n  display: flex; flex-wrap: wrap; gap: 6px;\n}\n.tag {\n  font-size: 10px; letter-spacing: 0.1em;\n  padding: 3px 8px;\n  color: var(--fg-faint);\n  border: 1px solid var(--line-soft);\n  border-radius: var(--radius);\n}\n\n.card__open {\n  margin-top: 16px;\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 11px; letter-spacing: 0.16em;\n  color: var(--accent);\n  transition: gap 0.4s var(--ease);\n}\n.card__open .arrow { transition: transform 0.4s var(--ease); }\n.card:hover .card__open { gap: 12px; }\n.card:hover .card__open .arrow { transform: translateX(3px); }\n\n/* --- ghost / coming-soon card --- */\n.card--ghost {\n  background: transparent;\n  border-style: dashed;\n  border-color: var(--line-soft);\n  justify-content: center;\n}\n.card--ghost::before { background: var(--line); opacity: 0.4; }\n.card--ghost:hover { transform: none; background: color-mix(in oklch, var(--ink-2) 50%, transparent); border-color: var(--line); }\n.card--ghost .card__node { border-color: var(--line); }\n.ghost__label {\n  font-size: 11px; letter-spacing: 0.22em;\n  color: var(--fg-faint);\n  display: flex; flex-direction: column; gap: 10px;\n}\n.ghost__slot {\n  font-family: \"Bricolage Grotesque\", system-ui, sans-serif;\n  font-size: 34px; font-weight: 600;\n  color: color-mix(in oklch, var(--fg) 22%, transparent);\n  letter-spacing: -0.02em;\n}\n\n/* ============ RESPONSIVE GRID ============ */\n@media (min-width: 680px) {\n  .grid { grid-template-columns: 1fr 1fr; gap: 20px; }\n}\n@media (min-width: 1000px) {\n  /* desktop: spine runs horizontally across the top of the row band */\n  .grid {\n    grid-template-columns: repeat(3, 1fr);\n    gap: 24px;\n    padding-left: 0;\n    padding-top: 40px;\n  }\n  .timeline__spine {\n    left: 0; right: 0; top: 0; bottom: auto;\n    width: auto; height: 1px;\n    background: linear-gradient(90deg, var(--line), var(--line-soft) 90%, transparent);\n  }\n  .card::after { /* connector now drops down from the spine */\n    left: 28px; top: -40px;\n    width: 1px; height: 33px;\n  }\n  .card__node { left: 24px; top: -44px; transform: none; }\n}\n\n/* ============ FOOTER ============ */\n.footer {\n  border-top: 1px solid var(--line);\n  background: color-mix(in oklch, var(--ink) 60%, black 6%);\n}\n.footer__inner {\n  max-width: var(--maxw);\n  margin: 0 auto;\n  padding: clamp(40px, 7vw, 72px) var(--gutter);\n  display: grid;\n  gap: 32px;\n}\n.footer__brand { display: flex; flex-direction: column; gap: 8px; }\n.footer__mark {\n  font-family: \"Bricolage Grotesque\", system-ui, sans-serif;\n  font-weight: 700; font-size: 22px; letter-spacing: -0.01em;\n}\n.footer__line { font-size: 12px; color: var(--fg-faint); letter-spacing: 0.04em; }\n\n.footer__links { display: flex; flex-wrap: wrap; gap: 14px; }\n.footer__link {\n  display: flex; flex-direction: column; gap: 4px;\n  padding: 12px 16px;\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  min-width: 200px;\n  transition: border-color 0.4s var(--ease), transform 0.4s var(--ease);\n}\n.footer__link:hover { border-color: color-mix(in oklch, var(--brass) 50%, var(--line)); transform: translateY(-2px); }\n.footer__link-k { font-size: 10px; letter-spacing: 0.2em; color: var(--fg-faint); }\n.footer__link-v { font-size: 13px; color: var(--fg); }\n.footer__legal { margin: 0; font-size: 11px; letter-spacing: 0.1em; color: var(--fg-faint); }\n\n@media (min-width: 760px) {\n  .footer__inner {\n    grid-template-columns: 1fr auto;\n    align-items: start;\n  }\n  .footer__legal { grid-column: 1 / -1; padding-top: 8px; border-top: 1px solid var(--line-soft); }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <!-- ============ ASSET POOL ============\n       Real <img> tags whose only job is to get inlined by the offline bundler.\n       The bundler reliably inlines HTML `src` attributes, but it CANNOT see image\n       paths that live only inside script.js — so the card icons are declared here\n       and the script reads the (already-inlined) image back out at render time.\n       ▶ To add an icon for a new app: copy one <img> line below and set BOTH the\n         data-asset-path and src to your new file. Then set that same path as the\n         app's `icon` in script.js. -->\n  <div id=\"asset-pool\" hidden=\"\" aria-hidden=\"true\">\n    <img data-asset-path=\"assets/kronfield-icon-128.png\" src=\"3f749c9a-9324-4b60-b22a-0bd810ed3436\" alt=\"\">\n  <\u002Fdiv>\n\n  <!-- ============ TOP BAR ============ -->\n  <header class=\"topbar\" aria-label=\"Masthead\">\n    <div class=\"topbar__inner\">\n      <span class=\"topbar__mark\">TEMPRAI<\u002Fspan>\n      <span class=\"topbar__sep\" aria-hidden=\"true\"><\u002Fspan>\n      <span class=\"topbar__meta\">INDIE APPS<\u002Fspan>\n      <div class=\"clock\" aria-label=\"Local time\">\n        <span class=\"clock__pulse\" id=\"pulse\" aria-hidden=\"true\"><\u002Fspan>\n        <span class=\"clock__time\" id=\"clock\">00:00:00<\u002Fspan>\n        <span class=\"clock__zone\" id=\"zone\">LOCAL<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ HERO ============ -->\n  <main>\n    <section class=\"hero\" aria-label=\"Introduction\">\n      <div class=\"hero__inner\">\n        <p class=\"hero__eyebrow\">\n          <span class=\"dot\" aria-hidden=\"true\"><\u002Fspan>\n          EST.&nbsp;MMXXVI — INDEPENDENT\n        <\u002Fp>\n\n        <h1 class=\"wordmark\" aria-label=\"TEMPRAI\">\n          TEMPR<span class=\"wordmark__ai\">AI<\u002Fspan>\n        <\u002Fh1>\n\n        <p class=\"hero__statement\">\n          Small, precise software — built one movement at a time,\n          and published here as they ship.\n        <\u002Fp>\n\n        <!-- Etymology shown as a small instrument-panel detail, not a paragraph -->\n        <div class=\"etymology\" aria-label=\"Etymology\">\n          <span class=\"etymology__part\">\n            <span class=\"etymology__word\">tempus<\u002Fspan>\n            <span class=\"etymology__gloss\">/ Latin — time<\u002Fspan>\n          <\u002Fspan>\n          <span class=\"etymology__op\" aria-hidden=\"true\">+<\u002Fspan>\n          <span class=\"etymology__part\">\n            <span class=\"etymology__word etymology__word--ai\">AI<\u002Fspan>\n            <span class=\"etymology__gloss\">/ artificial intelligence<\u002Fspan>\n          <\u002Fspan>\n          <span class=\"etymology__op\" aria-hidden=\"true\">=<\u002Fspan>\n          <span class=\"etymology__result\">TEMPRAI<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ APPS / INDEX ============ -->\n    <section class=\"index\" id=\"apps\" aria-label=\"Apps\">\n      <div class=\"index__head\">\n        <h2 class=\"index__title\">The&nbsp;Index<\u002Fh2>\n        <p class=\"index__sub\">\n          <span id=\"liveCount\">0<\u002Fspan>&nbsp;LIVE\n          <span class=\"index__sub-sep\" aria-hidden=\"true\">·<\u002Fspan>\n          <span id=\"totalCount\">0<\u002Fspan>&nbsp;SLOTS\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Timeline spine + cards are rendered here by script.js from the `apps` array -->\n      <div class=\"timeline\" id=\"timeline\">\n        <div class=\"timeline__spine\" aria-hidden=\"true\"><\u002Fdiv>\n        <div class=\"grid\" id=\"grid\" role=\"list\">\n          <!-- cards injected -->\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <!-- ============ FOOTER ============ -->\n  <footer class=\"footer\" aria-label=\"Contact\">\n    <div class=\"footer__inner\">\n      <div class=\"footer__brand\">\n        <span class=\"footer__mark\">TEMPRAI<\u002Fspan>\n        <span class=\"footer__line\">Indie software, made carefully.<\u002Fspan>\n      <\u002Fdiv>\n      <nav class=\"footer__links\" aria-label=\"Links\">\n        <!-- TODO: drop in your real handles -->\n        <a class=\"footer__link\" href=\"mailto:hello@temprai.dev\">\n          <span class=\"footer__link-k\">MAIL<\u002Fspan>\n          <span class=\"footer__link-v\">hello@temprai.dev<\u002Fspan>\n        <\u002Fa>\n        <a class=\"footer__link\" href=\"https://github.com/temprai\" target=\"_blank\" rel=\"noopener\">\n          <span class=\"footer__link-k\">GITHUB<\u002Fspan>\n          <span class=\"footer__link-v\">@temprai<\u002Fspan>\n        <\u002Fa>\n      <\u002Fnav>\n      <p class=\"footer__legal\">\n        <span id=\"year\">2025<\u002Fspan> TEMPRAI — all movements original.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <script src=\"51a4465a-db40-4df7-b9b4-a11fda1fbd3a\"><\u002Fscript>\n\n  <!-- Splash/fallback thumbnail for the standalone bundle: timeline spine + brass node -->\n  \n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
